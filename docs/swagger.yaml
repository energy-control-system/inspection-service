      properties:
        IsBroken:
          type: boolean
        SealID:
          type: integer
      type: object
externalDocs:
  description: ""
  url: ""
info:
  description: API for managing inspections, photos, and inspection completion.
  title: Inspection Service API
  version: "1.0"
openapi: 3.1.0
paths:
  /inspections:
    get:
      description: Returns all inspections.
      parameters:
      - description: Maximum number of items to return; 0 means no limit
        in: query
        name: limit
        schema:
          type: integer
      - description: Number of items to skip
        in: query
        name: offset
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/inspection-service_service_inspection.Inspection'
                type: array
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Internal Server Error
      summary: List inspections
      tags:
      - inspections
  /inspections/{id}:
    get:
      description: Returns an inspection by its ID.
      parameters:
      - description: Inspection ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inspection-service_service_inspection.Inspection'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Internal Server Error
      summary: Get inspection by ID
      tags:
      - inspections
  /inspections/{id}/finish:
    patch:
      description: Saves inspection results, generated data, and completion state.
      parameters:
      - description: Inspection ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/inspection-service_service_inspection.FinishInspectionRequest'
              description: Inspection completion payload
              summary: request
        description: Inspection completion payload
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inspection-service_service_inspection.Inspection'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Internal Server Error
      summary: Finish inspection
      tags:
      - inspections
  /inspections/{id}/photo:
    post:
      description: Uploads one device or seal photo and attaches it to an inspection.
      parameters:
      - description: Inspection ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
              - title: Photo
                type: file
              - title: AttachmentType
                type: integer
              - title: DeviceID
                type: integer
              - title: SealID
                type: integer
          multipart/form-data:
            schema:
              type: object
        description: 'Inspection photo | Attachment type: 1=device photo, 2=seal photo
          | Device ID, required when AttachmentType is 1 | Seal ID, required when
          AttachmentType is 2'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inspection-service_service_inspection.Attachment'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Internal Server Error
      summary: Attach inspection photo
      tags:
      - inspections
  /inspections/brigades/{brigadeID}:
    get:
      description: Returns inspections linked to tasks assigned to a brigade.
      parameters:
      - description: Brigade ID
        in: path
        name: brigadeID
        required: true
        schema:
          type: integer
      - description: Maximum number of items to return; 0 means no limit
        in: query
        name: limit
        schema:
          type: integer
      - description: Number of items to skip
        in: query
        name: offset
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/inspection-service_service_inspection.Inspection'
                type: array
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Internal Server Error
      summary: List brigade inspections
      tags:
      - inspections
  /inspections/task/{taskID}:
    get:
      description: Returns an inspection linked to a task.
      parameters:
      - description: Task ID
        in: path
        name: taskID
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inspection-service_service_inspection.Inspection'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Internal Server Error
      summary: Get inspection by task ID
      tags:
      - inspections
servers:
- url: /api/inspection-service
