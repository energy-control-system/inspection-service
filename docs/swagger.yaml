    gorouter.ErrorInfo:
      properties:
        code:
          type: string
        message:
          type: string
      type: object
    gorouter.ErrorResponse:
      properties:
        error:
          $ref: '#/components/schemas/gorouter.ErrorInfo'
      type: object
    inspection-service_service_inspection.Attachment:
      properties:
        CreatedAt:
          type: string
        FileID:
          type: integer
        ID:
          type: integer
        InspectionID:
          type: integer
        Type:
          $ref: '#/components/schemas/inspection-service_service_inspection.AttachmentType'
      type: object
    inspection-service_service_inspection.AttachmentType:
      enum:
      - 0
      - 1
      - 2
      - 3
      type: integer
      x-enum-varnames:
      - AttachmentTypeUnknown
      - AttachmentTypeDevicePhoto
      - AttachmentTypeSealPhoto
      - AttachmentTypeAct
    inspection-service_service_inspection.FinishInspectionRequest:
      properties:
        EnergyActionAt:
          type: string
        ID:
          type: integer
        InspectedDevices:
          items:
            $ref: '#/components/schemas/inspection.InspectedDeviceRequest'
          type: array
          uniqueItems: false
        IsExpenseAvailable:
          type: boolean
        IsRestrictionChecked:
          type: boolean
        IsUnauthorizedConsumers:
          type: boolean
        IsViolationDetected:
          type: boolean
        LimitReason:
          type: string
        Method:
          type: string
        MethodBy:
          $ref: '#/components/schemas/inspection-service_service_inspection.MethodBy'
        ReasonDescription:
          type: string
        ReasonType:
          $ref: '#/components/schemas/inspection-service_service_inspection.ReasonType'
        Resolution:
          $ref: '#/components/schemas/inspection-service_service_inspection.Resolution'
        Type:
          $ref: '#/components/schemas/inspection-service_service_inspection.Type'
        UnauthorizedDescription:
          type: string
        UnauthorizedExplanation:
          type: string
        ViolationDescription:
          type: string
      type: object
    inspection-service_service_inspection.InspectedDevice:
      properties:
        Consumption:
          type: number
        CreatedAt:
          type: string
        DeviceID:
          type: integer
        ID:
          type: integer
        InspectionID:
          type: integer
        Value:
          type: number
      type: object
    inspection-service_service_inspection.Inspection:
      properties:
        Attachments:
          items:
            $ref: '#/components/schemas/inspection-service_service_inspection.Attachment'
          type: array
          uniqueItems: false
        CreatedAt:
          type: string
        EnergyActionAt:
          type: string
        ID:
          type: integer
        InspectAt:
          type: string
        InspectedDevices:
          items:
            $ref: '#/components/schemas/inspection-service_service_inspection.InspectedDevice'
          type: array
          uniqueItems: false
        IsExpenseAvailable:
          type: boolean
        IsRestrictionChecked:
          type: boolean
        IsUnauthorizedConsumers:
          type: boolean
        IsViolationDetected:
          type: boolean
        LimitReason:
          type: string
        Method:
          type: string
        MethodBy:
          $ref: '#/components/schemas/inspection-service_service_inspection.MethodBy'
        ReasonDescription:
          type: string
        ReasonType:
          $ref: '#/components/schemas/inspection-service_service_inspection.ReasonType'
        Resolution:
          $ref: '#/components/schemas/inspection-service_service_inspection.Resolution'
        Status:
          $ref: '#/components/schemas/inspection-service_service_inspection.Status'
        TaskID:
          type: integer
        Type:
          $ref: '#/components/schemas/inspection-service_service_inspection.Type'
        UnauthorizedDescription:
          type: string
        UnauthorizedExplanation:
          type: string
        UpdatedAt:
          type: string
        ViolationDescription:
          type: string
      type: object
    inspection-service_service_inspection.MethodBy:
      enum:
      - 0
      - 1
      - 2
      type: integer
      x-enum-varnames:
      - MethodByUnknown
      - MethodByConsumer
      - MethodByInspector
    inspection-service_service_inspection.ReasonType:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      type: integer
      x-enum-varnames:
      - ReasonTypeUnknown
      - ReasonTypeNotIntroduced
      - ReasonTypeConsumerLimited
      - ReasonTypeInspectorLimited
      - ReasonTypeResumed
    inspection-service_service_inspection.Resolution:
      enum:
      - 0
      - 1
      - 2
      - 3
      type: integer
      x-enum-varnames:
      - ResolutionUnknown
      - ResolutionLimited
      - ResolutionStopped
      - ResolutionResumed
    inspection-service_service_inspection.Status:
      enum:
      - 0
      - 1
      - 2
      type: integer
      x-enum-varnames:
      - StatusUnknown
      - StatusInWork
      - StatusDone
    inspection-service_service_inspection.Type:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      type: integer
      x-enum-varnames:
      - TypeUnknown
      - TypeLimitation
      - TypeResumption
      - TypeVerification
      - TypeUnauthorizedConnection
    inspection.InspectedDeviceRequest:
      properties:
        Consumption:
          type: number
        DeviceID:
          type: integer
        InspectedSeals:
          items:
            $ref: '#/components/schemas/inspection.InspectedSealRequest'
          type: array
          uniqueItems: false
        Value:
          type: number
      type: object
